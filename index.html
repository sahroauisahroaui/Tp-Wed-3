<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Dashboard</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-7 card p-3 shadow-sm">
                <h4>رصد علامات الطلاب</h4>
                <table class="table">
                    <thead>
                        <tr><th>اسم الطالب</th><th>الدرجة (4.0)</th></tr>
                    </thead>
                    <tbody id="studentList">
                        </tbody>
                </table>
                <button class="btn btn-primary" onclick="saveGrades()">حفظ المعدلات</button>
            </div>

            <div class="col-md-4 offset-md-1 card p-3 shadow-sm">
                <h4>تطور المعدل التراكمي</h4>
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        
        const ctx = document.getElementById('myChart');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Sem 1', 'Sem 2', 'Sem 3', 'Sem 4'],
                datasets: [{
                    label: 'GPA',
                    data: [3.2, 3.5, 3.1, 3.8],
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.3
                }]
            }
        });
    </script>
</body>
</html>
