<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>لوحة التحكم - رصد الدرجات</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-7 card p-3 shadow-sm">
                <h4>رصد علامات الطلاب</h4>
                <table class="table">
                    <thead>
                        <tr><th>اسم الطالب</th><th>الدرجة (4.0)</th></tr>
                    </thead>
                    <tbody id="studentList">
                        <tr>
                            <td>طالب تجريبي</td>
                            <td><input type="number" step="0.1" class="grade-input" data-student="1" value="3.5"></td>
                        </tr>
                    </tbody>
                </table>
                <button class="btn btn-primary mt-3" onclick="saveGrades()">حفظ المعدلات</button>
            </div>

            <div class="col-md-4 offset-md-1 card p-3 shadow-sm">
                <h4>تطور المعدل التراكمي</h4>
                <div style="height: 300px;">
                    <canvas id="myChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
