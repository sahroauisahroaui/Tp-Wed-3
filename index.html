<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأداء الأكاديمي</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* تحسينات بسيطة لملاءمة الواجهة */
        .student-row:hover { background-color: #f1f7ff; cursor: pointer; }
        .chart-container { height: 300px; position: relative; }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="mb-4 text-center text-primary">نظام إدارة المعدلات الأكاديمية</h2>

        <div class="row mb-4 shadow-sm p-3 bg-white rounded">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 ابحث عن اسم الطالب هنا..." onkeyup="filterStudents()">
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-primary" onclick="saveGrades()">💾 حفظ التعديلات</button>
                <a href="export_csv.php" class="btn btn-success">📥 تصدير كـ CSV</a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">قائمة الطلاب والرصد</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>الطالب</th>
                                    <th>الدرجة (4.0)</th>
                                    <th>الإجراء</th>
                                </tr>
                            </thead>
                            <tbody id="studentList">
                                <tr class="student-row" onclick="loadStudentHistory(1)">
                                    <td>
                                        <div class="fw-bold">أحمد محمد</div>
                                        <small class="text-muted">ID: #1001</small>
                                    </td>
                                    <td>
                                        <input type="number" step="0.1" max="4" min="0" class="form-control grade-input" data-student="1" value="3.5">
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-info" onclick="loadStudentHistory(1)">عرض التاريخ</button>
                                    </td>
                                </tr>
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-header bg-white text-center">
                        <h5 class="mb-0">تطور المعدل التراكمي (GPA)</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="myChart"></canvas>
                        </div>
                        <div id="chartStatus" class="text-center mt-2 small text-muted">
                            انقر على اسم طالب لعرض منحنى أداءه
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
                                </html>
